name: AVdb-CSV Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: AVdb-CSV-release
  cancel-in-progress: false

jobs:
  check-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read zip file names and build release tag
        id: scan
        env:
          BASE_URL: ${{ secrets.AUTOUPCSV_BASE_URL }}
          WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${BASE_URL:-}" ]]; then
            echo "Missing AUTOUPCSV_BASE_URL secret" >&2
            exit 1
          fi
          if [[ -z "${WEBDAV_USERNAME:-}" || -z "${WEBDAV_PASSWORD:-}" ]]; then
            echo "Missing WEBDAV_USERNAME or WEBDAV_PASSWORD secret" >&2
            exit 1
          fi

          declare -a names=()
          html="$(curl -fsSL --user "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" "$BASE_URL")"
          while IFS= read -r n; do
            [[ -z "$n" ]] && continue
            names+=("$n")
          done < <(
            printf '%s' "$html" \
              | grep -Eoi 'href=["'"'"'][^"'"'"']+\.zip["'"'"']' \
              | sed -E 's/^href=["'"'"']([^"'"'"']+)["'"'"']$/\1/i' \
              | xargs -n1 basename \
              | sort -u
          )

          if [[ "${#names[@]}" -ne 2 ]]; then
            echo "Expected exactly 2 zip files, found ${#names[@]}: ${names[*]}" >&2
            exit 1
          fi

          IFS=$'\n' sorted=($(printf '%s\n' "${names[@]}" | sort))
          unset IFS

          joined="$(printf '%s\n' "${sorted[@]}")"
          fingerprint="$(printf '%s' "$joined" | sha256sum | awk '{print $1}')"
          
          # Generate timestamp in YYYY-MM-DD-HH-MM-SS format
          timestamp="$(date -u +'%Y-%m-%d-%H-%M-%S')"
          tag="${timestamp}"
          zip_names_csv="$(IFS=,; echo "${sorted[*]}")"

          {
            echo "names_fingerprint=$fingerprint"
            echo "tag=$tag"
            echo "timestamp=$timestamp"
            echo "zip_names_csv=$zip_names_csv"
            echo "asset_glob=downloads/*.zip"
            echo "zip_names<<EOF"
            for n in "${sorted[@]}"; do
              echo "- $n"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Detected zip names:"
          for n in "${sorted[@]}"; do
            echo "  $n"
          done
          echo "Name fingerprint: $fingerprint"
          echo "Tag: $tag"

      - name: Check if release already exists
        id: dedupe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.scan.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release already exists for $TAG, skip publishing."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No release for $TAG, will publish."
          fi

      - name: Download zip assets for release
        if: steps.dedupe.outputs.should_release == 'true'
        env:
          BASE_URL: ${{ secrets.AUTOUPCSV_BASE_URL }}
          WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
          ZIP_NAMES_CSV: ${{ steps.scan.outputs.zip_names_csv }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${BASE_URL:-}" ]]; then
            echo "Missing AUTOUPCSV_BASE_URL secret" >&2
            exit 1
          fi
          mkdir -p downloads

          IFS=',' read -r -a names <<< "$ZIP_NAMES_CSV"
          for name in "${names[@]}"; do
            name="$(echo "$name" | xargs)"
            [[ -z "$name" ]] && continue
            curl -fsSL --user "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" "${BASE_URL}${name}" -o "downloads/${name}"
          done

      - name: Build release display name
        id: naming
        shell: bash
        run: |
          set -euo pipefail
          timestamp="${{ steps.scan.outputs.timestamp }}"
          echo "release_name=${timestamp}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload assets
        id: publish
        if: steps.dedupe.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.scan.outputs.tag }}
          name: ${{ steps.naming.outputs.release_name }}
          make_latest: true
          body: |
            AVdb 自动上传生成的最新资源库版本.
            指纹验证: ${{ steps.scan.outputs.names_fingerprint }}

            文件列表:
            ${{ steps.scan.outputs.zip_names }}
          files: |
            ${{ steps.scan.outputs.asset_glob }}
          fail_on_unmatched_files: true

      - name: Cleanup old AVdb-CSV releases (keep latest 1)
        id: cleanup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t tags_to_delete < <(
            gh release list --limit 100 --json tagName,createdAt,body \
              --jq 'map(select(.body | contains("指纹验证: "))) | sort_by(.createdAt) | reverse | .[1:] | .[].tagName'
          )

          deleted=0
          for tag in "${tags_to_delete[@]}"; do
            [[ -z "$tag" ]] && continue
            gh release delete "$tag" --yes --cleanup-tag
            deleted=$((deleted + 1))
          done

          echo "deleted_count=$deleted" >> "$GITHUB_OUTPUT"
          echo "Deleted old releases: $deleted"

      - name: Force latest on current AVdb-CSV release
        if: steps.dedupe.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.scan.outputs.tag }}
          RELEASE_ID: ${{ steps.publish.outputs.id }}
        shell: bash
        run: |
          set -euo pipefail

          release_id="${RELEASE_ID:-}"

          if [[ -z "$release_id" ]]; then
            for attempt in 1 2 3 4 5; do
              release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.id' 2>/dev/null || true)"
              if [[ -n "$release_id" ]]; then
                break
              fi
              echo "Tag $TAG not discoverable yet (attempt $attempt/5), retrying..."
              sleep 4
            done
          fi

          if [[ -z "$release_id" ]]; then
            echo "Unable to resolve release id for $TAG" >&2
            exit 1
          fi

          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" -f make_latest=true >/dev/null

          for attempt in 1 2 3 4 5 6; do
            latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || true)"
            if [[ "$latest_tag" == "$TAG" ]]; then
              echo "Marked $TAG as latest (release id: $release_id)"
              exit 0
            fi
            echo "Latest is still '$latest_tag' (expect '$TAG'), retrying... (attempt $attempt/6)"
            sleep 5
          done

          echo "Failed to verify latest points to $TAG after retries" >&2
          exit 1

      - name: Summary
        shell: bash
        run: |
          trigger_source="${{ github.event_name }}"
          if [[ "$trigger_source" == "workflow_dispatch" ]]; then
            trigger_source="manual"
          fi

          {
            echo "## AVdb-CSV check result"
            echo
            echo "- Trigger source: ${trigger_source}"
            echo "- Tag: ${{ steps.scan.outputs.tag }}"
            echo "- Name fingerprint: ${{ steps.scan.outputs.names_fingerprint }}"
            echo "- Timestamp: ${{ steps.scan.outputs.timestamp }}"
            echo "- Created release: ${{ steps.dedupe.outputs.should_release }}"
            echo "- Deleted old releases: ${{ steps.cleanup.outputs.deleted_count }}"
            echo
            echo "### File names"
            echo "${{ steps.scan.outputs.zip_names }}"
          } >> "$GITHUB_STEP_SUMMARY"
